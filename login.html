<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628, #0d2137, #0a1628);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.3;
      animation: float 8s ease-in-out infinite;
    }
    .blob-1 { width: 340px; height: 340px; background: #1a6cf5; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 280px; height: 280px; background: #00c2ff; bottom: -80px; right: -60px; animation-delay: 3s; }
    .blob-3 { width: 200px; height: 200px; background: #0057d9; top: 45%; left: 55%; animation-delay: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    .glass-card {
      width: 380px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 40px 36px;
      position: relative;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    .header-area {
      text-align: center;
      margin-bottom: 28px;
    }
    .header-area h1 {
      color: #ffffff;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .header-area p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 14px;
      font-weight: 300;
    }

    .social-row {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }

    .social-btn {
      flex: 1;
      padding: 10px 0;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .social-btn:hover,
    .social-btn:active {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.26);
      color: #bde0ff;
    }
    .social-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }
    .divider span {
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
      white-space: nowrap;
      font-weight: 300;
    }

    .field-group {
      margin-bottom: 14px;
    }
    .field-group label {
      display: block;
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 7px;
    }

    .field-wrap {
      position: relative;
    }
    .field-wrap svg.field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: none;
    }
    .field-wrap input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      box-sizing: border-box;
    }
    .field-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.22);
    }
    .field-wrap input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(55, 138, 221, 0.75);
    }

    .eye-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.3);
      padding: 0;
      display: flex;
      align-items: center;
    }
    .eye-toggle:hover {
      color: rgba(255, 255, 255, 0.65);
    }
    .eye-toggle svg {
      width: 16px;
      height: 16px;
    }

    .forgot-row {
      text-align: right;
      margin: -4px 0 20px;
    }
    .forgot-row a {
      color: #378ADD;
      font-size: 13px;
      text-decoration: none;
      font-weight: 400;
      transition: color 0.2s;
    }
    .forgot-row a:hover {
      color: #60b0f0;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #378ADD, #1a6dbf);
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s, opacity 0.2s, transform 0.15s;
      letter-spacing: 0.2px;
    }
    .btn-login:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      color: #bde0ff;
    }
    .btn-login:active {
      transform: scale(0.98);
      color: #bde0ff;
    }

    .signup-row {
      text-align: center;
      margin-top: 20px;
    }
    .signup-row span {
      color: rgba(255, 255, 255, 0.38);
      font-size: 13px;
      font-weight: 300;
    }
    .signup-row a {
      color: #378ADD;
      font-size: 13px;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .signup-row a:hover {
      color: #60b0f0;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="glass-card">
    <div class="header-area">
      <h1>Bem-vindo de volta</h1>
      <p>Entre na sua conta para continuar</p>
    </div>

    <div class="social-row">
      <button class="social-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="social-btn">
        <svg viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Facebook
      </button>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span>ou continue com email</span>
      <div class="divider-line"></div>
    </div>

    <div class="field-group">
      <label>Email</label>
      <div class="field-wrap">
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <input type="email" placeholder="seu@email.com">
      </div>
    </div>

    <div class="field-group">
      <label>Senha</label>
      <div class="field-wrap">
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" placeholder="••••••••" id="pass-input">
        <button class="eye-toggle" onclick="togglePass()" type="button">
          <svg id="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eye-hide" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot-row">
      <a href="#">Esqueceu sua senha?</a>
    </div>

    <button class="btn-login">Entrar</button>

    <div class="signup-row">
      <span>Não tem uma conta? </span>
      <a href="#">Cadastre-se</a>
    </div>
  </div>

  <script>
    function togglePass() {
      const inp = document.getElementById('pass-input');
      const show = document.getElementById('eye-show');
      const hide = document.getElementById('eye-hide');
      if (inp.type === 'password') {
        inp.type = 'text';
        show.style.display = 'none';
        hide.style.display = 'block';
      } else {
        inp.type = 'password';
        show.style.display = 'block';
        hide.style.display = 'none';
      }
    }
  </script>

</body>
</html>
